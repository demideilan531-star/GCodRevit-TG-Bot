name: Repeat GCod V3 via Universal Publisher

on:
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  publish:
    if: github.event.head_commit.message == 'PUBLISH_GCOD_V3_VIA_UNIVERSAL'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild and verify exact uploaded video
        run: |
          set -euo pipefail
          cat .github/temp/repeat_gcod_v3/part_*.b64 | base64 --decode > /tmp/gcod-v3.mp4
          test -s /tmp/gcod-v3.mp4

          ACTUAL_SIZE=$(stat -c%s /tmp/gcod-v3.mp4)
          ACTUAL_SHA256=$(sha256sum /tmp/gcod-v3.mp4 | awk '{print $1}')
          test "$ACTUAL_SIZE" = '3412738'
          test "$ACTUAL_SHA256" = '37948517fe6b585b4aa0743585c8bf20865380607ea4fe74b2768b8378e67a68'

          if ! command -v ffprobe >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

          ffprobe -v error \
            -show_entries format=duration,size \
            -show_entries stream=codec_name,pix_fmt,width,height,r_frame_rate \
            -of json \
            /tmp/gcod-v3.mp4

      - name: Publish through universal Telegram script and report result
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          OUTPUT=$(python3 scripts/telegram_post.py \
            --type video \
            --text-file .github/temp/repeat_gcod_v3/caption.txt \
            --repository-path /tmp/gcod-v3.mp4 2>&1)
          EXIT_CODE=$?
          set -e

          printf '%s\n' "$OUTPUT"
          MESSAGE_IDS=$(printf '%s\n' "$OUTPUT" | sed -n 's/.*message_ids=//p' | tail -n 1)
          MESSAGE_ID=${MESSAGE_IDS%%,*}

          if [ "$EXIT_CODE" -eq 0 ] && [ -n "$MESSAGE_ID" ]; then
            STATE='success'
            DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
            COMMENT="✅ Telegram подтвердил повторную публикацию GCod-видео через универсальный отправщик. message_id=${MESSAGE_ID}; message_ids=${MESSAGE_IDS}; source_sha256=37948517fe6b585b4aa0743585c8bf20865380607ea4fe74b2768b8378e67a68; marker=UNIVERSAL_GCOD_V3_20260720"
            RESULT=0
          else
            STATE='failure'
            DESCRIPTION='Telegram publication failed'
            SAFE_OUTPUT=$(printf '%.1200s' "$OUTPUT")
            COMMENT="❌ Универсальный отправщик не опубликовал GCod-видео: ${SAFE_OUTPUT}; exit_code=${EXIT_CODE}; marker=UNIVERSAL_GCOD_V3_20260720"
            RESULT=1
          fi

          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n \
            --arg state "$STATE" \
            --arg context 'telegram-universal-video-post' \
            --arg description "$DESCRIPTION" \
            '{state: $state, context: $context, description: $description}' \
            > /tmp/status.json

          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json \
            >/dev/null || true

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json \
            >/dev/null || true

          rm -f /tmp/gcod-v3.mp4 /tmp/status.json /tmp/comment.json
          exit "$RESULT"
