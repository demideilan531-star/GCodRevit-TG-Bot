name: Send Gmail Report Photo

on:
  push:
    branches:
      - main
    paths:
      - "reports/latest.txt"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gmail-report-telegram
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate daily Gmail infographic
        run: |
          python -m pip install --quiet pillow
          cat > /tmp/make_report.py <<'PY'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont
          import re
          import textwrap

          report_path = Path('reports/latest.txt')
          if not report_path.exists():
              raise SystemExit('reports/latest.txt was not found')

          report = report_path.read_text(encoding='utf-8').strip()
          if not report:
              report = 'За последние 24 часа новых писем нет.'

          regular_path = '/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf'
          bold_path = '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf'

          f_title = ImageFont.truetype(bold_path, 62)
          f_sub = ImageFont.truetype(regular_path, 27)
          f_big = ImageFont.truetype(bold_path, 105)
          f_card = ImageFont.truetype(bold_path, 30)
          f_head = ImageFont.truetype(bold_path, 27)
          f_body = ImageFont.truetype(regular_path, 23)
          f_body_bold = ImageFont.truetype(bold_path, 23)
          f_small = ImageFont.truetype(regular_path, 19)

          def search(pattern, default='—'):
              match = re.search(pattern, report, re.IGNORECASE | re.MULTILINE)
              return match.group(1).strip() if match else default

          def metric(pattern):
              value = search(pattern, '0')
              found = re.search(r'\d+', value)
              return int(found.group(0)) if found else 0

          checked = search(r'^Проверка Gmail:\s*(.+)$', 'Ежедневная проверка Gmail')
          period = search(r'^Проверенный период:\s*(.+)$', 'последние 24 часа')
          new_count = metric(r'^Новых писем(?: за последние [^:]+)?:\s*([^\n]+)')
          urgent_count = metric(r'^Срочные и технические письма:\s*([^\n]+)')
          work_count = metric(r'^Ответы по работе или уч[её]бе:\s*([^\n]+)')
          invite_count = metric(r'^Приглашения:\s*([^\n]+)')
          finance_count = metric(r'^Финансовые вопросы:\s*([^\n]+)')
          security_count = metric(r'^Угрозы безопасности:\s*([^\n]+)')
          one_time_count = metric(r'^Одноразовые письма:\s*([^\n]+)')
          summary = search(r'^Главное:\s*(.+)$', 'Срочных действий не требуется.')

          entries = []
          matches = list(re.finditer(r'^(\d+)\.\s+(.+)$', report, re.MULTILINE))
          for index, match in enumerate(matches[:3]):
              start = match.start()
              end = matches[index + 1].start() if index + 1 < len(matches) else report.find('\n\nИТОГ', start)
              if end == -1:
                  end = len(report)
              block = report[start:end].strip()
              title = match.group(2).strip()
              gist = ''
              action = ''
              gist_match = re.search(r'^Суть:\s*(.+)$', block, re.MULTILINE)
              action_match = re.search(r'^Что сделать:\s*(.+)$', block, re.MULTILINE)
              if gist_match:
                  gist = gist_match.group(1).strip()
              if action_match:
                  action = action_match.group(1).strip()
              entries.append((title, gist, action))

          W, H = 1200, 1500
          image = Image.new('RGB', (W, H), '#06101e')
          draw = ImageDraw.Draw(image)

          for y in range(H):
              t = y / max(H - 1, 1)
              draw.line((0, y, W, y), fill=(5 + int(10*t), 16 + int(18*t), 31 + int(32*t)))

          # Night skyline.
          skyline_y = 250
          buildings = [(0,120,120),(95,70,110),(185,150,145),(315,95,130),(430,40,150),(570,125,110),(670,75,155),(825,130,115),(920,55,150),(1065,110,135)]
          for x, top, width in buildings:
              draw.rectangle((x, top, x + width, skyline_y), fill='#091827')
              for wx in range(x + 16, x + width - 8, 26):
                  for wy in range(top + 18, skyline_y - 10, 32):
                      if (wx + wy) % 3:
                          draw.rectangle((wx, wy, wx + 7, wy + 11), fill='#d0a955')

          # Desk and laptop silhouette.
          draw.rectangle((0, 1330, W, H), fill='#07101a')
          draw.rounded_rectangle((760, 1185, 1105, 1405), radius=18, fill='#101b27', outline='#33516d', width=3)
          draw.rectangle((790, 1215, 1075, 1370), fill='#0d2944')
          draw.polygon([(700, 1410), (1145, 1410), (1180, 1450), (650, 1450)], fill='#152533')

          # Main glass panel.
          draw.rounded_rectangle((45, 40, 1155, 1320), radius=34, fill='#0a1727', outline='#2a86ff', width=3)

          # Header.
          draw.rounded_rectangle((75, 70, 1125, 205), radius=26, fill='#0d2138', outline='#315b82', width=2)
          draw.rounded_rectangle((100, 95, 168, 163), radius=14, fill='#e94545')
          draw.polygon([(108,105),(134,128),(160,105),(160,118),(134,141),(108,118)], fill='white')
          draw.text((195, 82), 'ОТЧЁТ ПО GMAIL', font=f_title, fill='white')
          draw.text((198, 157), checked, font=f_sub, fill='#a9c8e8')

          # Period card.
          draw.rounded_rectangle((75, 225, 1125, 300), radius=20, fill='#10263c')
          draw.text((105, 246), f'ПЕРИОД: {period}', font=f_small, fill='#b7d2e9')

          # Count and status cards.
          draw.rounded_rectangle((75, 325, 510, 545), radius=27, fill='#0c3153', outline='#3ca6ff', width=3)
          draw.text((110, 360), 'НОВЫХ ПИСЕМ', font=f_card, fill='#9bd5ff')
          draw.text((110, 405), str(new_count), font=f_big, fill='#ffffff' if new_count else '#62dd8b')
          draw.text((275, 478), 'за последние 24 часа', font=f_body, fill='#d5ebff')

          attention = urgent_count + security_count
          if attention:
              status_fill, status_outline, status_color = '#3a2118', '#ff6b57', '#ff8d79'
              status_title = 'ТРЕБУЕТ ВНИМАНИЯ'
              status_text = f'Писем, требующих проверки: {attention}'
          else:
              status_fill, status_outline, status_color = '#173024', '#45c777', '#78e5a0'
              status_title = 'ВСЁ СПОКОЙНО'
              status_text = 'Срочных действий не требуется'
          draw.rounded_rectangle((540, 325, 1125, 545), radius=27, fill=status_fill, outline=status_outline, width=3)
          draw.text((580, 360), status_title, font=f_card, fill=status_color)
          yy = 418
          for line in textwrap.wrap(status_text, width=35):
              draw.text((580, yy), line, font=f_body_bold, fill='white')
              yy += 36

          # Category rows.
          rows = [
              ('СРОЧНЫЕ / ТЕХНИЧЕСКИЕ', urgent_count, '#ff6b62'),
              ('РАБОТА / УЧЁБА', work_count, '#57c78a'),
              ('ПРИГЛАШЕНИЯ', invite_count, '#a27aff'),
              ('ФИНАНСЫ', finance_count, '#ffc24b'),
              ('БЕЗОПАСНОСТЬ', security_count, '#ff6b62'),
              ('ОДНОРАЗОВЫЕ', one_time_count, '#59b9ff'),
          ]
          y = 575
          for label, value, accent in rows:
              draw.rounded_rectangle((75, y, 1125, y + 62), radius=17, fill='#0d2135')
              draw.ellipse((100, y + 18, 126, y + 44), fill=accent)
              draw.text((150, y + 17), label, font=f_body_bold, fill='#dce9f4')
              draw.text((1040, y + 13), str(value), font=f_head, fill='white')
              y += 72

          # Key events.
          draw.text((80, 1010), 'ГЛАВНОЕ', font=f_head, fill='#7dc8ff')
          y = 1050
          if entries:
              for idx, (title, gist, action) in enumerate(entries, 1):
                  draw.text((90, y), f'{idx}. {title}', font=f_body_bold, fill='white')
                  y += 31
                  combined = gist or action
                  for line in textwrap.wrap(combined, width=78)[:2]:
                      draw.text((118, y), line, font=f_small, fill='#bfd2e2')
                      y += 27
                  y += 10
                  if y > 1260:
                      break
          else:
              draw.text((90, y), 'За последние 24 часа новых писем нет.', font=f_body, fill='#72e59a')

          draw.text((75, 1280), 'GMAIL MONITOR BOT · ежедневный отчёт в 19:00', font=f_small, fill='#7598b7')
          image.save('/tmp/gmail_report.png', optimize=True)

          caption_lines = [
              '📬 Ежедневный отчёт по Gmail',
              f'🕒 {checked}',
              f'📨 Новых писем: {new_count}',
              '',
              f'🚨 Срочные/технические: {urgent_count}',
              f'💼 Работа/учёба: {work_count}',
              f'📅 Приглашения: {invite_count}',
              f'💳 Финансы: {finance_count}',
              f'🔐 Угрозы безопасности: {security_count}',
              f'🗂 Одноразовые: {one_time_count}',
              '',
              f'Главное: {summary}',
          ]
          caption = '\n'.join(caption_lines)
          if len(caption) > 1000:
              caption = caption[:997] + '…'
          Path('/tmp/caption.txt').write_text(caption, encoding='utf-8')
          PY
          python /tmp/make_report.py

      - name: Send photo and text in one Telegram post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl --silent --show-error --fail-with-body \
            --connect-timeout 20 --max-time 90 \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "photo=@/tmp/gmail_report.png" \
            --form-string "caption=$(cat /tmp/caption.txt)"

          echo "Telegram accepted the Gmail report photo and caption."
