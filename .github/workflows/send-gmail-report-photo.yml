name: Send Gmail Report Photo

on:
  push:
    branches:
      - main
    paths:
      - ".github/temp/gmail_report_trigger.txt"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate report image
        run: |
          python -m pip install --quiet pillow
          cat > /tmp/make_report.py <<'PY'
          from PIL import Image, ImageDraw, ImageFont
          from textwrap import wrap

          W, H = 1200, 1500
          img = Image.new('RGB', (W, H), '#07111f')
          d = ImageDraw.Draw(img)

          regular = '/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf'
          bold = '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf'
          f_title = ImageFont.truetype(bold, 72)
          f_sub = ImageFont.truetype(regular, 34)
          f_big = ImageFont.truetype(bold, 110)
          f_head = ImageFont.truetype(bold, 38)
          f_body = ImageFont.truetype(regular, 28)
          f_small = ImageFont.truetype(regular, 24)

          # Background gradient
          for y in range(H):
              t = y / H
              r = int(7 + 9*t)
              g = int(17 + 16*t)
              b = int(31 + 28*t)
              d.line((0, y, W, y), fill=(r, g, b))

          # Header
          d.rounded_rectangle((45, 35, 1155, 175), radius=28, fill='#0d2138', outline='#2a86ff', width=3)
          d.text((85, 58), 'ОТЧЁТ ПО GMAIL', font=f_title, fill='white')
          d.text((88, 132), '19 июля 2026 · 02:03 МСК · последние 65 минут', font=f_sub, fill='#a9c8e8')

          # Main count card
          d.rounded_rectangle((45, 205, 520, 470), radius=28, fill='#0c3153', outline='#3ca6ff', width=3)
          d.text((85, 240), 'НОВЫХ ПИСЕМ', font=f_head, fill='#79c6ff')
          d.text((85, 290), '7', font=f_big, fill='white')
          d.text((235, 355), 'Все письма — технические\nуведомления GitHub', font=f_body, fill='#cfe9ff', spacing=8)

          # Alert card
          d.rounded_rectangle((550, 205, 1155, 470), radius=28, fill='#3a2710', outline='#ffbd3e', width=3)
          d.text((590, 240), '⚠ ВАЖНО', font=f_head, fill='#ffd466')
          alert = 'Все 7 запусков workflow main.yml завершились без выполнения задач: “No jobs were run”.'
          yy = 305
          for line in wrap(alert, 38):
              d.text((590, yy), line, font=f_body, fill='white')
              yy += 40

          # Timeline
          d.rounded_rectangle((45, 505, 1155, 1110), radius=28, fill='#0b1828', outline='#36536f', width=2)
          d.text((80, 540), 'СРОЧНЫЕ / ТЕХНИЧЕСКИЕ ПИСЬМА', font=f_head, fill='#ff6767')
          rows = [
              ('01:57', '9e2d59f'), ('01:56', '9032b95'), ('01:50', 'e2b7796'),
              ('01:49', '69b4b35'), ('01:49', 'f17f67c'), ('01:48', 'b70e449'), ('01:46', '844cb27')
          ]
          y = 615
          for i, (tm, sha) in enumerate(rows, 1):
              d.ellipse((80, y+3, 120, y+43), fill='#ff5c62')
              d.text((94, y+9), str(i), font=f_small, fill='white', anchor='mm')
              d.text((145, y), tm, font=f_body, fill='#d9e8f6')
              d.text((270, y), 'GitHub notifications', font=f_body, fill='white')
              d.text((270, y+36), f'Run failed: main.yml · {sha}', font=f_small, fill='#a9c8e8')
              y += 70

          # Action card
          d.rounded_rectangle((45, 1145, 1155, 1275), radius=25, fill='#17271f', outline='#48c878', width=3)
          d.text((80, 1175), 'ДЕЙСТВИЕ', font=f_head, fill='#72e59a')
          d.text((315, 1178), 'Проверить условия запуска и синтаксис workflow, затем повторить запуск.', font=f_body, fill='white')

          # Footer metrics
          metrics = [('Работа/учёба', '0'), ('Приглашения', '0'), ('Финансы', '0'), ('Безопасность', '0')]
          x = 45
          for label, value in metrics:
              d.rounded_rectangle((x, 1310, x+255, 1435), radius=22, fill='#0c1f33', outline='#284b6b', width=2)
              d.text((x+25, 1335), label, font=f_small, fill='#9fc3e3')
              d.text((x+25, 1370), value, font=f_head, fill='white')
              x += 275

          d.text((50, 1460), 'GMAIL MONITOR BOT · отчёты каждый час', font=f_small, fill='#7697b5')
          img.save('/tmp/gmail_report.png', optimize=True)
          PY
          python /tmp/make_report.py

      - name: Send photo to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          CAPTION=$(cat <<'EOF'
          📬 Отчёт по Gmail

          За последние 65 минут получено 7 технических писем от GitHub.
          Все они сообщают об одной проблеме: workflow main.yml завершился без запуска задач — «No jobs were run».

          🔧 Требуется проверить условия запуска и синтаксис workflow, затем повторить запуск.

          Ответы по работе/учёбе: 0
          Приглашения: 0
          Финансовые вопросы: 0
          Угрозы безопасности: 0
          EOF
          )

          curl --silent --show-error --fail-with-body \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "photo=@/tmp/gmail_report.png" \
            --form-string "caption=${CAPTION}"

      - name: Record successful delivery
        run: |
          printf 'Telegram post delivered successfully at %s\n' "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/temp/gmail_report_success.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/temp/gmail_report_success.txt
          git commit -m "Record Telegram report delivery" || exit 0
          git push
