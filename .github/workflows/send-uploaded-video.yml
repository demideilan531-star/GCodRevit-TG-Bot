name: Send Uploaded Telegram Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "Прямая ссылка на MP4"
        required: false
        type: string
      repository_path:
        description: "Путь к MP4 внутри репозитория"
        required: false
        type: string
      caption:
        description: "Подпись к видео"
        required: true
        default: "Видео GCod Revit"
        type: string
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  send-video:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.event.head_commit.message == 'TRIGGER_UPLOADED_VIDEO')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare MP4
        env:
          VIDEO_URL: ${{ inputs.video_url }}
          REPOSITORY_PATH: ${{ inputs.repository_path }}
        run: |
          set -euo pipefail

          if [ -n "${VIDEO_URL:-}" ]; then
            curl --location --fail --silent --show-error \
              "$VIDEO_URL" \
              --output /tmp/uploaded-video.mp4
          elif [ -n "${REPOSITORY_PATH:-}" ]; then
            cp "$REPOSITORY_PATH" /tmp/uploaded-video.mp4
          elif compgen -G 'temp_video/part_*.b64' >/dev/null; then
            cat temp_video/part_*.b64 | base64 --decode > /tmp/uploaded-video.mp4
          else
            echo 'Не передан video_url, repository_path и нет частей base64.' >&2
            exit 1
          fi

          test -s /tmp/uploaded-video.mp4
          MIME=$(file --brief --mime-type /tmp/uploaded-video.mp4)
          if [ "$MIME" != 'video/mp4' ] && [ "$MIME" != 'application/octet-stream' ]; then
            echo "Получен неподдерживаемый тип файла: $MIME" >&2
            exit 1
          fi

          ffprobe -v error \
            -show_entries format=duration,size \
            -of default=noprint_wrappers=1 \
            /tmp/uploaded-video.mp4

      - name: Send video and record Telegram confirmation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CAPTION_TEXT: ${{ inputs.caption }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "video=@/tmp/uploaded-video.mp4;type=video/mp4" \
            -F "supports_streaming=true" \
            --form-string "caption=${CAPTION_TEXT}")
          CURL_EXIT=$?
          set -e

          OK=$(printf '%s' "$RESPONSE" | jq -r '.ok // false' 2>/dev/null || printf 'false')
          MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id // empty' 2>/dev/null || true)

          if [ "$CURL_EXIT" -eq 0 ] && [ "$OK" = "true" ] && [ -n "$MESSAGE_ID" ]; then
            STATE='success'
            DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
            COMMENT="✅ Telegram подтвердил отправку загруженного видео и текста. message_id=${MESSAGE_ID}"
            RESULT=0
          else
            ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
            STATE='failure'
            DESCRIPTION="Telegram: ${ERROR_TEXT}"
            COMMENT="❌ Telegram не принял загруженное видео: ${ERROR_TEXT}; curl_exit=${CURL_EXIT}"
            RESULT=1
          fi

          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n --arg state "$STATE" --arg context 'telegram-uploaded-video' --arg description "$DESCRIPTION" \
            '{state: $state, context: $context, description: $description}' > /tmp/status.json

          curl --silent --show-error --fail-with-body \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json >/dev/null || true

          exit "$RESULT"
