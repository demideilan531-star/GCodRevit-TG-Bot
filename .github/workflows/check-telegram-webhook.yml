name: Check Telegram Webhook

on:
  workflow_dispatch:

jobs:
  check-webhook:
    runs-on: ubuntu-latest
    steps:
      - name: Check webhook info
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          set -euo pipefail
          curl -sS "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getWebhookInfo"

      - name: Check hosting from GitHub runner
        run: |
          set -euo pipefail
          curl -v --max-time 20 "https://tgbotgcodrevit.ru/telegram-webhook.php?health=1"
