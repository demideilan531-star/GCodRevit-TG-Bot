name: Send Final GCod Video V3

on:
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  send-video:
    if: github.event.head_commit.message == 'TRIGGER_SEND_FINAL_GCOD_V3_VISUAL'
    runs-on: ubuntu-latest

    steps:
      - name: Verify the requested video, publish it, and record Telegram confirmation
        env:
          VIDEO_URL_B64: ''
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          RESULT=1
          STATE='failure'
          DESCRIPTION='Telegram: publication was not completed'
          COMMENT='❌ Видео не отправлено: неизвестная ошибка'
          VIDEO_PATH='/tmp/gcod-final-v3.mp4'
          MARKER='FINAL_GCOD_V3_VISUAL_20260720'

          EXISTING=$(curl --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments?per_page=100")
          ALREADY_SENT=$(printf '%s' "$EXISTING" | jq -r --arg marker "$MARKER" 'any(.[]; ((.body // "") | contains("message_id=")) and ((.body // "") | contains($marker)))' 2>/dev/null || printf 'false')

          if [ "$ALREADY_SENT" = 'true' ]; then
            STATE='success'
            DESCRIPTION='Telegram post was already confirmed'
            COMMENT="ℹ️ Повторная отправка пропущена: публикация уже подтверждена; marker=${MARKER}"
            RESULT=0
          else
            if ! command -v ffmpeg >/dev/null 2>&1 || ! command -v ffprobe >/dev/null 2>&1; then
              sudo apt-get update >/tmp/apt-update.log 2>&1 && sudo apt-get install -y ffmpeg >/tmp/apt-install.log 2>&1
            fi
            TOOLS_EXIT=$?

            if [ "$TOOLS_EXIT" -ne 0 ] || ! command -v ffmpeg >/dev/null 2>&1 || ! command -v ffprobe >/dev/null 2>&1; then
              ERROR_TEXT=$(tail -c 400 /tmp/apt-install.log /tmp/apt-update.log 2>/dev/null || printf 'ffmpeg unavailable')
              DESCRIPTION='Telegram: video tools unavailable'
              COMMENT="❌ Видео не отправлено: не удалось подготовить ffmpeg; ${ERROR_TEXT}"
            else
              VIDEO_URL=$(printf '%s' "$VIDEO_URL_B64" | base64 --decode 2>/dev/null)
              curl --fail --location --silent --show-error --retry 3 --max-time 180 "$VIDEO_URL" --output "$VIDEO_PATH" 2>/tmp/video-download-error.txt
              DOWNLOAD_EXIT=$?

              if [ "$DOWNLOAD_EXIT" -ne 0 ] || [ ! -s "$VIDEO_PATH" ]; then
                ERROR_TEXT=$(tail -c 400 /tmp/video-download-error.txt 2>/dev/null || printf 'download failed')
                DESCRIPTION='Telegram: video download failed'
                COMMENT="❌ Видео не отправлено: не удалось скачать файл; curl_exit=${DOWNLOAD_EXIT}; ${ERROR_TEXT}"
              else
                CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=nw=1:nk=1 "$VIDEO_PATH" 2>/dev/null)
                PIX_FMT=$(ffprobe -v error -select_streams v:0 -show_entries stream=pix_fmt -of default=nw=1:nk=1 "$VIDEO_PATH" 2>/dev/null)
                WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=nw=1:nk=1 "$VIDEO_PATH" 2>/dev/null)
                HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of default=nw=1:nk=1 "$VIDEO_PATH" 2>/dev/null)
                FPS=$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate -of default=nw=1:nk=1 "$VIDEO_PATH" 2>/dev/null)
                DURATION=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$VIDEO_PATH" 2>/dev/null)
                AUDIO_CODEC=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=nw=1:nk=1 "$VIDEO_PATH" 2>/dev/null)
                ACTUAL_SIZE=$(stat -c%s "$VIDEO_PATH" 2>/dev/null)
                ACTUAL_SHA256=$(sha256sum "$VIDEO_PATH" 2>/dev/null | awk '{print $1}')

                BASIC_OK='true'
                [ "$CODEC" = 'h264' ] || BASIC_OK='false'
                [ "$PIX_FMT" = 'yuv420p' ] || BASIC_OK='false'
                [ "$FPS" = '30/1' ] || BASIC_OK='false'
                [ "$AUDIO_CODEC" = 'aac' ] || BASIC_OK='false'
                case "${WIDTH}x${HEIGHT}" in
                  720x1280|1080x1920) ;;
                  *) BASIC_OK='false' ;;
                esac
                awk -v d="$DURATION" 'BEGIN { exit !(d >= 44.8 && d <= 45.2) }'
                [ "$?" -eq 0 ] || BASIC_OK='false'

                if [ "$BASIC_OK" != 'true' ]; then
                  DESCRIPTION='Telegram: video format verification failed'
                  COMMENT="❌ Видео не отправлено: неверные характеристики; codec=${CODEC}; pix_fmt=${PIX_FMT}; size=${WIDTH}x${HEIGHT}; fps=${FPS}; duration=${DURATION}; audio=${AUDIO_CODEC}"
                else
                  python3 - "$VIDEO_PATH" >/tmp/visual-verify.txt 2>&1 <<'PY'
          import subprocess
          import sys

          path = sys.argv[1]
          expected = [
              '0002ffff7e000000',
              '00ffffffff000000',
              '00ffffffff000000',
              '007effffff000000',
              '0000ffffff7e0000',
              '007effffff000000',
              '0000ffffff000000',
              'e0ffff00d000e1e0',
              'ffff80f88000ffff',
          ]
          raw = subprocess.check_output([
              'ffmpeg', '-v', 'error', '-i', path,
              '-vf', 'fps=1/5,scale=8:8,format=gray',
              '-f', 'rawvideo', '-pix_fmt', 'gray', '-'
          ])
          frames = [raw[i:i + 64] for i in range(0, len(raw), 64)]
          actual = []
          for frame in frames:
              if len(frame) != 64:
                  continue
              average = sum(frame) / 64
              bits = 0
              for value in frame:
                  bits = (bits << 1) | int(value >= average)
              actual.append(f'{bits:016x}')
          if len(actual) != len(expected):
              raise SystemExit(f'fingerprint_count={len(actual)} expected={len(expected)}')
          distances = [(int(a, 16) ^ int(e, 16)).bit_count() for a, e in zip(actual, expected)]
          print('actual=' + ','.join(actual))
          print('distances=' + ','.join(map(str, distances)))
          print(f'max_distance={max(distances)} total_distance={sum(distances)}')
          if max(distances) > 14 or sum(distances) > 55:
              raise SystemExit('visual fingerprint mismatch')
          PY
                  VISUAL_EXIT=$?
                  VERIFY_DETAILS=$(tail -c 700 /tmp/visual-verify.txt 2>/dev/null | tr '\n' ';')

                  if [ "$VISUAL_EXIT" -ne 0 ]; then
                    DESCRIPTION='Telegram: visual identity verification failed'
                    COMMENT="❌ Видео не отправлено: скачанный ролик не совпал с загруженным финальным v3; verification=${VERIFY_DETAILS}"
                  else
                    CAPTION=$(cat <<'POST'
          #МыЭтоРукамиНеДелаем

          Вы сегодня час собирали таблицу выбора?

          А мы начинаем с пустого семейства, загружаем две картинки — чертёж и таблицу производителя — и нажимаем одну кнопку.

          Примерно через 20 секунд GCod создаёт 14 параметров, опорные плоскости, размеры и таблицу выбора. Остаётся проверить результат и продолжить проектирование.

          Инженер должен проектировать, а не быть копировальным аппаратом.

          Какую рутину превратить в следующую кнопку?

          #GCodRevit #BIMБезРутины
          POST
                    )

                    RESPONSE=$(curl --silent --show-error --max-time 180 \
                      --request POST \
                      "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
                      -F "chat_id=${TELEGRAM_CHAT_ID}" \
                      -F "video=@${VIDEO_PATH};type=video/mp4" \
                      -F "supports_streaming=true" \
                      --form-string "caption=${CAPTION}")
                    TELEGRAM_EXIT=$?
                    OK=$(printf '%s' "$RESPONSE" | jq -r '.ok // false' 2>/dev/null || printf 'false')
                    MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id // empty' 2>/dev/null || true)
                    HAS_VIDEO=$(printf '%s' "$RESPONSE" | jq -r 'if (.result.video | type) == "object" then "true" else "false" end' 2>/dev/null || printf 'false')

                    if [ "$TELEGRAM_EXIT" -eq 0 ] && [ "$OK" = 'true' ] && [ -n "$MESSAGE_ID" ] && [ "$HAS_VIDEO" = 'true' ]; then
                      STATE='success'
                      DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
                      COMMENT="✅ Telegram подтвердил публикацию финального GCod-видео и текста. message_id=${MESSAGE_ID}; delivered_sha256=${ACTUAL_SHA256}; delivered_size=${ACTUAL_SIZE}; delivered_dimensions=${WIDTH}x${HEIGHT}; visual_match=true; marker=${MARKER}"
                      RESULT=0
                    else
                      ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
                      DESCRIPTION="Telegram: ${ERROR_TEXT}"
                      COMMENT="❌ Telegram не принял видео: ${ERROR_TEXT}; curl_exit=${TELEGRAM_EXIT}; ok=${OK}; has_video=${HAS_VIDEO}; visual_match=true; marker=${MARKER}"
                    fi
                  fi
                fi
              fi
            fi
          fi

          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n --arg state "$STATE" --arg context 'telegram-final-gcod-v3' --arg description "$DESCRIPTION" '{state: $state, context: $context, description: $description}' > /tmp/status.json
          curl --silent --show-error --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json >/dev/null || true
          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json >/dev/null || true
          rm -f "$VIDEO_PATH" /tmp/video-download-error.txt /tmp/visual-verify.txt /tmp/status.json /tmp/comment.json /tmp/apt-update.log /tmp/apt-install.log
          exit "$RESULT"
