name: Repost Exact GCod Video V3

on:
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  repost-video:
    if: github.event.head_commit.message == 'TRIGGER_EXACT_GCOD_VIDEO_V3_REPOST_SHA37948517'
    runs-on: ubuntu-latest

    steps:
      - name: Prevent duplicate confirmed repost
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          COMMENTS=$(curl --silent --show-error --fail-with-body -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments?per_page=100")
          if printf '%s' "$COMMENTS" | jq -e 'any(.[]; (.body // "") | contains("marker=EXACT_GCOD_V3_REPOST_SHA37948517"))' >/dev/null; then
            echo 'Exact repost already confirmed; skipping duplicate.'
            exit 78
          fi

      - name: Download and verify exact final video
        env:
          VIDEO_URL_B64: ''
          EXPECTED_SHA256: '37948517fe6b585b4aa0743585c8bf20865380607ea4fe74b2768b8378e67a68'
          EXPECTED_SIZE: '3412738'
        run: |
          set -euo pipefail
          if ! command -v ffprobe >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          VIDEO_URL=$(printf '%s' "$VIDEO_URL_B64" | base64 --decode)
          curl --fail --location --silent --show-error --retry 3 "$VIDEO_URL" --output /tmp/gcod-exact-v3.mp4
          ACTUAL_SIZE=$(stat -c%s /tmp/gcod-exact-v3.mp4)
          ACTUAL_SHA256=$(sha256sum /tmp/gcod-exact-v3.mp4 | awk '{print $1}')
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 /tmp/gcod-exact-v3.mp4)
          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=noprint_wrappers=1:nokey=1 /tmp/gcod-exact-v3.mp4)
          HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of default=noprint_wrappers=1:nokey=1 /tmp/gcod-exact-v3.mp4)
          VCODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 /tmp/gcod-exact-v3.mp4)
          ACODEC=$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of default=noprint_wrappers=1:nokey=1 /tmp/gcod-exact-v3.mp4)
          test "$ACTUAL_SIZE" = "$EXPECTED_SIZE"
          test "$ACTUAL_SHA256" = "$EXPECTED_SHA256"
          awk -v d="$DURATION" 'BEGIN { exit !(d >= 44.9 && d <= 45.1) }'
          test "$WIDTH" = '1080'
          test "$HEIGHT" = '1920'
          test "$VCODEC" = 'h264'
          test "$ACODEC" = 'aac'

      - name: Send same post with corrected video
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          CAPTION=$(cat <<'POST'
          Вы сегодня час собирали таблицу выбора?

          Мы загрузили две картинки — чертёж и таблицу производителя — нажали «Собрать» и примерно через 20 секунд получили основу семейства.

          GCod создал 14 параметров, опорные плоскости, размеры и таблицу выбора. Остаётся проверить результат и продолжить проектирование.

          Инженер не должен быть копировальным аппаратом.
          Мы это руками не делаем.

          Пишите предложения в комментариях — какую рутину превратить в следующую кнопку?

          #МыЭтоРукамиНеДелаем #GCodRevit #BIMБезРутины
          POST
          )
          set +e
          RESPONSE=$(curl --silent --show-error --request POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" -F "chat_id=${TELEGRAM_CHAT_ID}" -F "video=@/tmp/gcod-exact-v3.mp4;type=video/mp4" -F "supports_streaming=true" --form-string "caption=${CAPTION}")
          CURL_EXIT=$?
          set -e
          OK=$(printf '%s' "$RESPONSE" | jq -r '.ok // false' 2>/dev/null || printf 'false')
          MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id // empty' 2>/dev/null || true)
          HAS_VIDEO=$(printf '%s' "$RESPONSE" | jq -r 'if (.result.video | type) == "object" then "true" else "false" end' 2>/dev/null || printf 'false')
          if [ "$CURL_EXIT" -eq 0 ] && [ "$OK" = 'true' ] && [ -n "$MESSAGE_ID" ] && [ "$HAS_VIDEO" = 'true' ]; then
            STATE='success'
            DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
            COMMENT="✅ Telegram подтвердил повторную публикацию точного GCod-видео. message_id=${MESSAGE_ID}; source_sha256=37948517fe6b585b4aa0743585c8bf20865380607ea4fe74b2768b8378e67a68; source_size=3412738; marker=EXACT_GCOD_V3_REPOST_SHA37948517"
            RESULT=0
          else
            ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
            STATE='failure'
            DESCRIPTION="Telegram: ${ERROR_TEXT}"
            COMMENT="❌ Telegram не принял точное GCod-видео: ${ERROR_TEXT}; curl_exit=${CURL_EXIT}; ok=${OK}; has_video=${HAS_VIDEO}; marker=EXACT_GCOD_V3_REPOST_SHA37948517"
            RESULT=1
          fi
          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n --arg state "$STATE" --arg context 'telegram-exact-video-repost' --arg description "$DESCRIPTION" '{state: $state, context: $context, description: $description}' > /tmp/status.json
          curl --silent --show-error --fail-with-body --request POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" --data-binary @/tmp/status.json
          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error --fail-with-body --request POST -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" --data-binary @/tmp/comment.json >/dev/null
          rm -f /tmp/gcod-exact-v3.mp4 /tmp/status.json /tmp/comment.json
          exit "$RESULT"
