name: Repost Exact GCod Video V3

on:
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  repost-video:
    if: github.event.head_commit.message == 'TRIGGER_EXACT_GCOD_VIDEO_V3_REPOST2_SHA37948517'
    runs-on: ubuntu-latest

    steps:
      - name: Verify, publish and report exact video
        env:
          VIDEO_URL_B64: ''
          EXPECTED_SHA256: '37948517fe6b585b4aa0743585c8bf20865380607ea4fe74b2768b8378e67a68'
          EXPECTED_SIZE: '3412738'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e

          RESULT=1
          STATE='failure'
          DESCRIPTION='Telegram: publication was not completed'
          COMMENT='❌ Telegram publication was not completed: unknown error'
          VIDEO_PATH='/tmp/gcod-exact-v3.mp4'
          DOWNLOAD_ERROR='/tmp/video-download-error.txt'

          EXISTING=$(curl --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments?per_page=100")
          ALREADY_SENT=$(printf '%s' "$EXISTING" | jq -r --arg sha "$EXPECTED_SHA256" 'any(.[]; ((.body // "") | contains("message_id=")) and ((.body // "") | contains($sha)))' 2>/dev/null || printf 'false')

          if [ "$ALREADY_SENT" = 'true' ]; then
            STATE='success'
            DESCRIPTION='Exact GCod video was already confirmed'
            COMMENT="ℹ️ Повторная отправка пропущена: точное видео уже подтверждено Telegram; source_sha256=${EXPECTED_SHA256}"
            RESULT=0
          else
            VIDEO_URL=$(printf '%s' "$VIDEO_URL_B64" | base64 --decode 2>/dev/null)
            DECODE_EXIT=$?

            if [ "$DECODE_EXIT" -ne 0 ] || [ -z "$VIDEO_URL" ]; then
              DESCRIPTION='Telegram: video URL decode failed'
              COMMENT="❌ Точное GCod-видео не отправлено: не удалось восстановить адрес файла; decode_exit=${DECODE_EXIT}"
            else
              curl --fail --location --silent --show-error --retry 3 --max-time 180 \
                "$VIDEO_URL" \
                --output "$VIDEO_PATH" \
                2>"$DOWNLOAD_ERROR"
              DOWNLOAD_EXIT=$?

              if [ "$DOWNLOAD_EXIT" -ne 0 ] || [ ! -s "$VIDEO_PATH" ]; then
                ERROR_TEXT=$(tail -c 400 "$DOWNLOAD_ERROR" 2>/dev/null || printf 'download failed')
                DESCRIPTION='Telegram: exact video download failed'
                COMMENT="❌ Точное GCod-видео не отправлено: не удалось скачать файл; curl_exit=${DOWNLOAD_EXIT}; ${ERROR_TEXT}"
              else
                ACTUAL_SIZE=$(stat -c%s "$VIDEO_PATH" 2>/dev/null)
                ACTUAL_SHA256=$(sha256sum "$VIDEO_PATH" 2>/dev/null | awk '{print $1}')

                if [ "$ACTUAL_SIZE" != "$EXPECTED_SIZE" ] || [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
                  DESCRIPTION='Telegram: exact video verification failed'
                  COMMENT="❌ Точное GCod-видео не отправлено: файл не совпал с загруженным пользователем; expected_size=${EXPECTED_SIZE}; actual_size=${ACTUAL_SIZE}; expected_sha256=${EXPECTED_SHA256}; actual_sha256=${ACTUAL_SHA256}"
                else
                  CAPTION=$(cat <<'POST'
          Вы сегодня час собирали таблицу выбора?

          Мы загрузили две картинки — чертёж и таблицу производителя — нажали «Собрать» и примерно через 20 секунд получили основу семейства.

          GCod создал 14 параметров, опорные плоскости, размеры и таблицу выбора. Остаётся проверить результат и продолжить проектирование.

          Инженер не должен быть копировальным аппаратом.
          Мы это руками не делаем.

          Пишите предложения в комментариях — какую рутину превратить в следующую кнопку?

          #МыЭтоРукамиНеДелаем #GCodRevit #BIMБезРутины
          POST
                  )

                  RESPONSE=$(curl --silent --show-error --max-time 180 \
                    --request POST \
                    "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
                    -F "chat_id=${TELEGRAM_CHAT_ID}" \
                    -F "video=@${VIDEO_PATH};type=video/mp4" \
                    -F "supports_streaming=true" \
                    --form-string "caption=${CAPTION}")
                  TELEGRAM_EXIT=$?
                  OK=$(printf '%s' "$RESPONSE" | jq -r '.ok // false' 2>/dev/null || printf 'false')
                  MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id // empty' 2>/dev/null || true)
                  HAS_VIDEO=$(printf '%s' "$RESPONSE" | jq -r 'if (.result.video | type) == "object" then "true" else "false" end' 2>/dev/null || printf 'false')

                  if [ "$TELEGRAM_EXIT" -eq 0 ] && [ "$OK" = 'true' ] && [ -n "$MESSAGE_ID" ] && [ "$HAS_VIDEO" = 'true' ]; then
                    STATE='success'
                    DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
                    COMMENT="✅ Telegram подтвердил повторную публикацию точного GCod-видео. message_id=${MESSAGE_ID}; source_sha256=${ACTUAL_SHA256}; source_size=${ACTUAL_SIZE}; marker=EXACT_GCOD_V3_REPOST2_SHA37948517"
                    RESULT=0
                  else
                    ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
                    DESCRIPTION="Telegram: ${ERROR_TEXT}"
                    COMMENT="❌ Telegram не принял точное GCod-видео: ${ERROR_TEXT}; curl_exit=${TELEGRAM_EXIT}; ok=${OK}; has_video=${HAS_VIDEO}; source_sha256=${ACTUAL_SHA256}; source_size=${ACTUAL_SIZE}"
                  fi
                fi
              fi
            fi
          fi

          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n \
            --arg state "$STATE" \
            --arg context 'telegram-exact-video-repost' \
            --arg description "$DESCRIPTION" \
            '{state: $state, context: $context, description: $description}' \
            > /tmp/status.json

          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json \
            >/dev/null || true

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json \
            >/dev/null || true

          rm -f "$VIDEO_PATH" "$DOWNLOAD_ERROR" /tmp/status.json /tmp/comment.json
          exit "$RESULT"
