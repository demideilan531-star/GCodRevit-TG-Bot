name: Send Telegram Message

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Текст сообщения"
        required: true
        default: "Тестовое сообщение от GitHub Actions"
        type: string
  push:
    paths:
      - ".github/temp/send_photo_trigger.txt"

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Send content to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TEXT: ${{ inputs.message }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "photo=https://avatars.githubusercontent.com/u/247617988?v=4" \
              --data-urlencode "caption=Тестовое фото от ChatGPT 📸"
          else
            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE_TEXT}"
          fi

          echo "Telegram accepted the request."