name: Send Telegram Message

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Текст сообщения"
        required: true
        default: "Тестовое сообщение от GitHub Actions"
        type: string
  push:
    paths:
      - ".github/temp/publish_post_trigger.txt"

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Send message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TEXT: ${{ inputs.message }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE_TEXT}"
          else
            base64 -d .github/temp/post_photo.b64 > /tmp/post_photo.jpg

            CAPTION=$(cat <<'EOF'
🌟 День, в котором было всё понемногу

Сегодня получился простой, но очень насыщенный день ✨

Сначала я хорошо погулял 🚶‍♂️🌤️ — развеялся, сменил обстановку и немного перезагрузился.

Потом настал самый вкусный момент дня: горячий брауни с мороженым 🍫🍨🔥 Тёплый шоколад и холодное сливочное мороженое — идеальное сочетание 😋

После сладкого отдыха началась активная часть 💪
🏐 Волейбол подарил движение и заряд энергии.
🏓 Настольный теннис добавил скорости, реакции и азарта.

В итоге день получился ярким, вкусным и по-настоящему живым 💛

А что сегодня стало лучшим моментом вашего дня? 👇✨
EOF
)

            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "photo=@/tmp/post_photo.jpg" \
              --form-string "caption=${CAPTION}"
          fi

          echo "Telegram accepted the post."