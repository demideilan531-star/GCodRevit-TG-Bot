name: Send Telegram Message

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Текст сообщения"
        required: true
        default: "Тестовое сообщение от GitHub Actions"
        type: string
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  send-message:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
      github.event.head_commit.message == 'TRIGGER_TELEGRAM_VERIFIED')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Send post to Telegram and publish verifiable result
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MANUAL_MESSAGE: ${{ inputs.message }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FORMAT="текст"
            set +e
            RESPONSE=$(curl --silent --show-error \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MANUAL_MESSAGE}")
            CURL_EXIT=$?
            set -e
          else
            cat \
              telegram_payloads/weather_20260719.part1 \
              telegram_payloads/weather_20260719.part2 \
              | base64 --decode > /tmp/moscow-weather.png

            test -s /tmp/moscow-weather.png
            ACTUAL_SHA=$(sha256sum /tmp/moscow-weather.png | awk '{print $1}')
            EXPECTED_SHA="6bf429772fa7612e0505dbb253bbcb284732debb6583716c580727272609d03b"
            if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
              echo "Image checksum mismatch" >&2
              exit 1
            fi

            CAPTION=$(cat <<'POST'
          ☀️ Погода в Москве: сегодня и завтра

          Сегодня, 19 июля, в столице солнечно и сухо. Днём около +28 °C, местами воздух прогреется до +30 °C. Ветер южный 2–4 м/с, осадков не ожидается. Из-за жары действует оранжевый уровень погодной опасности.

          Завтра, 20 июля, жара сохранится: ночью +17…+19 °C, днём около +28 °C, местами до +30 °C. Ожидается переменная облачность без дождя, ветер слабый — 1–3 м/с. УФ-индекс высокий.

          Берите с собой воду и головной убор, а в середине дня старайтесь меньше находиться под прямым солнцем. 🌡️
          POST
            )

            FORMAT="фото и текст"
            set +e
            RESPONSE=$(curl --silent --show-error \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
              --form-string "chat_id=${TELEGRAM_CHAT_ID}" \
              --form "photo=@/tmp/moscow-weather.png;type=image/png" \
              --form-string "caption=${CAPTION}")
            CURL_EXIT=$?
            set -e
          fi

          if [ "$CURL_EXIT" -eq 0 ] && [ "$(printf '%s' "$RESPONSE" | jq -r '.ok // false')" = "true" ]; then
            MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id')
            STATE="success"
            DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
            COMMENT="✅ Telegram подтвердил отправку: ${FORMAT}. message_id=${MESSAGE_ID}"
            RESULT=0
          else
            ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
            STATE="failure"
            DESCRIPTION="Telegram: ${ERROR_TEXT}"
            COMMENT="❌ Telegram не принял публикацию: ${ERROR_TEXT}; curl_exit=${CURL_EXIT}"
            RESULT=1
          fi

          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n \
            --arg state "$STATE" \
            --arg context "telegram-post" \
            --arg description "$DESCRIPTION" \
            '{state: $state, context: $context, description: $description}' \
            > /tmp/status.json

          curl --silent --show-error --fail-with-body \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json \
            >/dev/null || true

          exit "$RESULT"
