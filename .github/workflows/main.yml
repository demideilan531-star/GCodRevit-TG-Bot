name: Send Telegram Post

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Текст сообщения или подписи"
        required: true
        default: "Тестовая публикация от GitHub Actions"
        type: string
      media_type:
        description: "Тип публикации: text или video"
        required: true
        default: "text"
        type: string
      video_base64_path:
        description: "Путь к base64-файлу MP4 в репозитории"
        required: false
        default: ".github/temp/telegram_video.mp4.b64"
        type: string
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  send-post:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
      github.event.head_commit.message == 'TRIGGER_TELEGRAM_VERIFIED')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Send post to Telegram and publish verifiable result
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MANUAL_MESSAGE: ${{ inputs.message }}
          MANUAL_MEDIA_TYPE: ${{ inputs.media_type }}
          MANUAL_VIDEO_PATH: ${{ inputs.video_base64_path }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MESSAGE_TEXT="$MANUAL_MESSAGE"
            MEDIA_TYPE="$MANUAL_MEDIA_TYPE"
            VIDEO_B64_PATH="$MANUAL_VIDEO_PATH"
          else
            MESSAGE_TEXT=$(cat <<'POST'
          🎬 Проверяем публикацию видео через GPT и GitHub Actions.

          Это короткий технический тест: теперь бот должен уметь отправлять в канал не только текст и фотографии, но и настоящий MP4-файл через Telegram Bot API.

          Следующий шаг — использовать эту же механику для демонстраций функций GCod Revit. 🚀
          POST
            )
            MEDIA_TYPE="video"
            VIDEO_B64_PATH=".github/temp/telegram_video.mp4.b64"
          fi

          set +e
          if [ "$MEDIA_TYPE" = "video" ]; then
            if [ ! -f "$VIDEO_B64_PATH" ]; then
              RESPONSE='{"ok":false,"description":"video base64 file not found"}'
              CURL_EXIT=1
            else
              base64 --decode "$VIDEO_B64_PATH" > /tmp/telegram-video.mp4
              RESPONSE=$(curl --silent --show-error \
                --request POST \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "video=@/tmp/telegram-video.mp4;type=video/mp4" \
                -F "supports_streaming=true" \
                -F "caption=${MESSAGE_TEXT}")
              CURL_EXIT=$?
            fi
            FORMAT_TEXT="видео и текст"
          else
            RESPONSE=$(curl --silent --show-error \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE_TEXT}")
            CURL_EXIT=$?
            FORMAT_TEXT="текст"
          fi
          set -e

          if [ "$CURL_EXIT" -eq 0 ] && [ "$(printf '%s' "$RESPONSE" | jq -r '.ok // false')" = "true" ]; then
            MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id')
            STATE='success'
            DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
            COMMENT="✅ Telegram подтвердил отправку: ${FORMAT_TEXT}. message_id=${MESSAGE_ID}"
            RESULT=0
          else
            ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
            STATE='failure'
            DESCRIPTION="Telegram: ${ERROR_TEXT}"
            COMMENT="❌ Telegram не принял публикацию: ${ERROR_TEXT}; curl_exit=${CURL_EXIT}"
            RESULT=1
          fi

          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n \
            --arg state "$STATE" \
            --arg context 'telegram-post' \
            --arg description "$DESCRIPTION" \
            '{state: $state, context: $context, description: $description}' \
            > /tmp/status.json

          curl --silent --show-error --fail-with-body \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json \
            >/dev/null || true

          exit "$RESULT"
