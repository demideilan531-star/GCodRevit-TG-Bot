name: Send Telegram Message

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Текст сообщения"
        required: true
        default: "Тестовое сообщение от GitHub Actions"
        type: string
  push:
    paths:
      - ".github/temp/publish_post_trigger.txt"

permissions:
  contents: read

jobs:
  send-message:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message == 'Publish requested Telegram post'
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TEXT: ${{ inputs.message }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE_TEXT}"
          else
            cat > /tmp/post_photo.b64 <<'PHOTO_EOF'
[... ELLIPSIZATION ...]
PHOTO_EOF
            base64 -d /tmp/post_photo.b64 > /tmp/post_photo.jpg

            CAPTION=$(cat <<'CAPTION_EOF'
<b>🌟 День, в котором было всё понемногу</b>

Сегодня получился простой, но очень насыщенный день ✨

🚶‍♂️ Сначала я хорошо погулял: развеялся, сменил обстановку и просто насладился моментом. Такие прогулки отлично перезагружают голову и возвращают лёгкость.

🍫🍨 Затем наступил самый вкусный момент — горячий брауни с мороженым. Тёплый шоколадный десерт и холодное сливочное мороженое оказались идеальным сочетанием 😋

После сладкого отдыха началась активная часть дня 💪

🏐 Волейбол подарил движение, азарт и мощный заряд энергии.
🏓 Настольный теннис добавил скорости, реакции и весёлого соревнования.

В итоге день получился очень сбалансированным и ярким: приятная прогулка, вкусный десерт, спорт и хорошее настроение. К вечеру осталась приятная усталость и ощущение, что день прожит активно и с удовольствием 💛

<b>А что сегодня стало лучшим моментом вашего дня?</b> 👇✨
CAPTION_EOF
)

            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
              -F "chat_id=${TELEGRAM_CHAT_ID}" \
              -F "photo=@/tmp/post_photo.jpg" \
              -F "parse_mode=HTML" \
              --form-string "caption=${CAPTION}"
          fi

          echo "Telegram accepted the post."
