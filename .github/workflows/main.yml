name: Send Telegram Message

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Текст сообщения"
        required: true
        default: "Тестовое сообщение от GitHub Actions"
        type: string
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  send-message:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
      github.event.head_commit.message == 'TRIGGER_TELEGRAM_VERIFIED')
    runs-on: ubuntu-latest

    steps:
      - name: Send content to Telegram and publish verifiable result
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TEXT: ${{ inputs.message }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE_TEXT}"
            exit 0
          fi

          CAPTION='Тестовое сообщение с фотографией от ChatGPT ✅ Связка ChatGPT → GitHub Actions → Telegram работает.'

          set +e
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "photo=https://avatars.githubusercontent.com/u/247617988?v=4" \
            --data-urlencode "caption=${CAPTION}")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -eq 0 ] && [ "$(printf '%s' "$RESPONSE" | jq -r '.ok // false')" = "true" ]; then
            MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id')
            STATE='success'
            DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
            COMMENT="✅ Telegram подтвердил отправку фото и текста. message_id=${MESSAGE_ID}"
            RESULT=0
          else
            ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
            STATE='failure'
            DESCRIPTION="Telegram: ${ERROR_TEXT}"
            COMMENT="❌ Telegram не принял сообщение: ${ERROR_TEXT}; curl_exit=${CURL_EXIT}"
            RESULT=1
          fi

          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n \
            --arg state "$STATE" \
            --arg context 'telegram-post' \
            --arg description "$DESCRIPTION" \
            '{state: $state, context: $context, description: $description}' \
            > /tmp/status.json

          curl --silent --show-error --fail-with-body \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json \
            >/dev/null || true

          exit "$RESULT"
