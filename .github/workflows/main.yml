name: Send Telegram Message

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Текст сообщения"
        required: true
        default: "Тестовое сообщение от GitHub Actions"
        type: string
  push:
    paths:
      - ".github/temp/publish_post_trigger.txt"

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest

    steps:
      - name: Send message to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TEXT: ${{ inputs.message }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE_TEXT}"
          else
            CAPTION=$(cat <<'EOF'
📬 Отчёт по Gmail

🕒 Проверен последний час
📨 Новых писем: 0

✅ Срочных писем нет
💼 Ответов по работе или учёбе нет
📅 Приглашений нет
💳 Финансовых вопросов нет
🔐 Угроз безопасности нет

🤖 Почта проверяется автоматически каждый час.
EOF
)

            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "photo=https://picsum.photos/seed/gmail-monitor/1200/800" \
              --data-urlencode "caption=${CAPTION}"
          fi

          echo "Telegram accepted the post."