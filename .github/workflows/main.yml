name: Send Telegram Message

on:
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  send-message:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.number == 1 &&
      github.event.comment.body == 'SEND_GCOD_FAMILY_VIDEO_20260719_3')
    runs-on: ubuntu-latest

    steps:
      - name: Download, validate, send, and report
        env:
          VIDEO_URL: "https://production-273614-media-export.storage.googleapis.com/15289b00-92e8-4699-bc65-18b7e7899ad4/original.mp4?X-Goog-Algorithm=GOOG4-RSA-SHA256&X-Goog-Credential=descript-api%40production-273614.iam.gserviceaccount.com%2F20260719%2Fauto%2Fstorage%2Fgoog4_request&X-Goog-Date=20260719T211512Z&X-Goog-Expires=86400&X-Goog-SignedHeaders=host&X-Goog-"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! command -v ffprobe >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

          set +e

          DOWNLOAD_ERROR=$(mktemp)
          curl --fail --location --silent --show-error --retry 3 \
            "$VIDEO_URL" \
            --output /tmp/gcod-family-video.mp4 \
            2>"$DOWNLOAD_ERROR"
          DOWNLOAD_EXIT=$?

          RESULT=1
          STATE='failure'
          DESCRIPTION='Telegram: video download failed'
          COMMENT="❌ GCod-видео не отправлено: не удалось скачать видео; curl_exit=${DOWNLOAD_EXIT}; $(tail -c 300 "$DOWNLOAD_ERROR")"

          if [ "$DOWNLOAD_EXIT" -eq 0 ] && [ -s /tmp/gcod-family-video.mp4 ]; then
            PROBE_ERROR=$(mktemp)
            ffprobe -v error \
              -show_entries format=duration,size \
              -show_entries stream=codec_name,pix_fmt,width,height,r_frame_rate \
              -of json \
              /tmp/gcod-family-video.mp4 \
              >/tmp/video-probe.json \
              2>"$PROBE_ERROR"
            PROBE_EXIT=$?

            if [ "$PROBE_EXIT" -ne 0 ]; then
              DESCRIPTION='Telegram: invalid downloaded video'
              COMMENT="❌ GCod-видео не отправлено: скачанный файл не прошёл ffprobe; $(tail -c 300 "$PROBE_ERROR")"
            else
              CAPTION=$(cat <<'POST'
          Вы сегодня час собирали таблицу выбора?

          Мы загрузили две картинки — чертёж и таблицу производителя — нажали «Собрать» и примерно через 20 секунд получили основу семейства.

          GCod создал 14 параметров, опорные плоскости, размеры и таблицу выбора. Остаётся проверить результат и продолжить проектирование.

          Инженер не должен быть копировальным аппаратом.
          Мы это руками не делаем.

          Пишите предложения в комментариях — какую рутину превратить в следующую кнопку?

          #МыЭтоРукамиНеДелаем #GCodRevit #BIMБезРутины
          POST
              )

              RESPONSE=$(curl --silent --show-error \
                --request POST \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "video=@/tmp/gcod-family-video.mp4;type=video/mp4" \
                -F "supports_streaming=true" \
                -F "caption=${CAPTION}")
              TELEGRAM_CURL_EXIT=$?

              OK=$(printf '%s' "$RESPONSE" | jq -r '.ok // false' 2>/dev/null || printf 'false')
              MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id // empty' 2>/dev/null || true)
              HAS_VIDEO=$(printf '%s' "$RESPONSE" | jq -r '.result.video != null' 2>/dev/null || printf 'false')

              if [ "$TELEGRAM_CURL_EXIT" -eq 0 ] && [ "$OK" = "true" ] && [ -n "$MESSAGE_ID" ] && [ "$HAS_VIDEO" = "true" ]; then
                STATE='success'
                DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
                COMMENT="✅ Telegram подтвердил GCod-видео и текст. message_id=${MESSAGE_ID}"
                RESULT=0
              else
                ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
                DESCRIPTION="Telegram: ${ERROR_TEXT}"
                COMMENT="❌ Telegram не принял GCod-видео: ${ERROR_TEXT}; curl_exit=${TELEGRAM_CURL_EXIT}; ok=${OK}; has_video=${HAS_VIDEO}"
              fi
            fi
          fi

          set -e
          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n \
            --arg state "$STATE" \
            --arg context 'telegram-video-post' \
            --arg description "$DESCRIPTION" \
            '{state: $state, context: $context, description: $description}' \
            > /tmp/status.json

          curl --silent --show-error --fail-with-body \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json \
            >/dev/null || true

          exit "$RESULT"
