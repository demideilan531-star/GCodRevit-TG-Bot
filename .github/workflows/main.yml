name: Send Telegram Message

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Текст сообщения"
        required: true
        default: "Тестовое сообщение от GitHub Actions"
        type: string
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  send-message:
    if: github.event_name == 'workflow_dispatch' || github.event.issue.title == 'Publish Telegram day post'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Send message or verified photo post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE_TEXT: ${{ inputs.message }}
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -u

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            curl --silent --show-error --fail-with-body \
              --request POST \
              "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE_TEXT}"
            exit 0
          fi

          cat \
            .github/tg-post-20260719/photo.small.part1 \
            .github/tg-post-20260719/photo.small.part2 \
            > /tmp/photo.b64

          base64 --decode /tmp/photo.b64 > /tmp/photo.jpg
          CAPTION="$(cat .github/tg-post-20260719/caption.txt)"

          set +e
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "photo=@/tmp/photo.jpg" \
            --form-string "caption=${CAPTION}" \
            --form-string "parse_mode=HTML")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -eq 0 ] && [ "$(printf '%s' "$RESPONSE" | jq -r '.ok // false')" = "true" ]; then
            MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id')
            COMMENT="✅ Telegram подтвердил публикацию. message_id=${MESSAGE_ID}"
            RESULT=0
          else
            DESCRIPTION=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
            COMMENT="❌ Telegram не принял публикацию: ${DESCRIPTION}; curl_exit=${CURL_EXIT}"
            RESULT=1
          fi

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error --fail-with-body \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            --data-binary @/tmp/comment.json

          exit "$RESULT"
