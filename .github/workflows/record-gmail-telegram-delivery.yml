name: Record Gmail Telegram Delivery

on:
  workflow_run:
    workflows:
      - "Send Gmail Report Photo"
    types:
      - completed

permissions:
  contents: write

jobs:
  record:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Record workflow result
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          UPDATED_AT: ${{ github.event.workflow_run.updated_at }}
        run: |
          mkdir -p reports
          cat > reports/telegram_delivery_status.txt <<EOF
          conclusion=${CONCLUSION}
          run_id=${RUN_ID}
          head_sha=${HEAD_SHA}
          updated_at=${UPDATED_AT}
          run_url=${RUN_URL}
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/telegram_delivery_status.txt
          git commit -m "Record Gmail Telegram delivery ${CONCLUSION}" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
