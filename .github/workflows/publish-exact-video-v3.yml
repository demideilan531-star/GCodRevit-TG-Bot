name: Publish Exact GCod Video V3

on:
  push:

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  publish-video:
    if: github.event.head_commit.message == 'TRIGGER_TELEGRAM_EXACT_VIDEO_V3'
    runs-on: ubuntu-latest

    steps:
      - name: Download and verify the exact 45-second final composition
        env:
          VIDEO_URL: 'https://production-273614-media-export.storage.googleapis.com/4eb0ff85-f556-4285-b369-392c82409b79/original.mp4?X-Goog-Algorithm=GOOG4-RSA-SHA256&X-Goog-Credential=descript-api%40production-273614.iam.gserviceaccount.com%2F20260720%2Fauto%2Fstorage%2Fgoog4_request&X-Goog-Date=20260720T072736Z&X-Goog-Expires=86400&X-Goog-SignedHeaders=host&X-Goog-'
          EXPECTED_SHA256: '37948517fe6b585b4aa0743585c8bf20865380607ea4fe74b2768b8378e67a68'
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location --retry 3 "$VIDEO_URL" -o /tmp/gcod-family-v3.mp4

          test -s /tmp/gcod-family-v3.mp4
          ACTUAL_SHA256=$(sha256sum /tmp/gcod-family-v3.mp4 | awk '{print $1}')
          echo "downloaded_sha256=${ACTUAL_SHA256}"

          CODEC=$(ffprobe -v error -select_streams v:0 -show_entries stream=codec_name -of default=nw=1:nk=1 /tmp/gcod-family-v3.mp4)
          PIX_FMT=$(ffprobe -v error -select_streams v:0 -show_entries stream=pix_fmt -of default=nw=1:nk=1 /tmp/gcod-family-v3.mp4)
          WIDTH=$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of default=nw=1:nk=1 /tmp/gcod-family-v3.mp4)
          HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of default=nw=1:nk=1 /tmp/gcod-family-v3.mp4)
          FPS=$(ffprobe -v error -select_streams v:0 -show_entries stream=r_frame_rate -of default=nw=1:nk=1 /tmp/gcod-family-v3.mp4)
          DURATION=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 /tmp/gcod-family-v3.mp4)

          test "$CODEC" = "h264"
          test "$PIX_FMT" = "yuv420p"
          test "$WIDTH" = "1080"
          test "$HEIGHT" = "1920"
          test "$FPS" = "30/1"
          python3 - "$DURATION" <<'PY'
          import sys
          duration = float(sys.argv[1])
          if not 44.9 <= duration <= 45.1:
              raise SystemExit(f'unexpected duration: {duration}')
          PY

          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            python3 - <<'PY'
          import subprocess

          expected = [
              '0002ffff7e000000',
              '00ffffffff000000',
              '00ffffffff000000',
              '007effffff000000',
              '0000ffffff7e0000',
              '007effffff000000',
              '0000ffffff000000',
              'e0ffff00d000e1e0',
              'ffff80f88000ffff',
          ]
          raw = subprocess.check_output([
              'ffmpeg', '-v', 'error', '-i', '/tmp/gcod-family-v3.mp4',
              '-vf', 'fps=1/5,scale=8:8,format=gray',
              '-f', 'rawvideo', '-pix_fmt', 'gray', '-'
          ])
          frames = [raw[i:i+64] for i in range(0, len(raw), 64)]
          actual = []
          for frame in frames:
              if len(frame) != 64:
                  continue
              avg = sum(frame) / 64
              bits = 0
              for value in frame:
                  bits = (bits << 1) | int(value >= avg)
              actual.append(f'{bits:016x}')
          if len(actual) != len(expected):
              raise SystemExit(f'frame fingerprint count mismatch: {len(actual)} != {len(expected)}')
          distances = [(int(a, 16) ^ int(e, 16)).bit_count() for a, e in zip(actual, expected)]
          print('perceptual_frame_distances=' + ','.join(map(str, distances)))
          if max(distances) > 14 or sum(distances) > 55:
              raise SystemExit('downloaded composition does not match the uploaded v3 video')
          PY
          fi

      - name: Send the verified video to Telegram and record confirmation
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -u
          CAPTION=$(cat <<'POST'
          #МыЭтоРукамиНеДелаем

          Вы сегодня час собирали таблицу выбора?

          Мы начинаем с пустого семейства, загружаем две картинки — чертёж и таблицу производителя — и нажимаем одну кнопку.

          Примерно через 20 секунд GCod создаёт:
          — 14 параметров;
          — опорные плоскости и размеры;
          — таблицу выбора;
          — рабочую заготовку семейства.

          Инженер должен проектировать, а не быть копировальным аппаратом.

          Какую рутину превратить в следующую кнопку?
          POST
          )

          set +e
          RESPONSE=$(curl --silent --show-error \
            --request POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendVideo" \
            -F "chat_id=${TELEGRAM_CHAT_ID}" \
            -F "video=@/tmp/gcod-family-v3.mp4;type=video/mp4" \
            -F "supports_streaming=true" \
            --form-string "caption=${CAPTION}")
          CURL_EXIT=$?
          set -e

          OK=$(printf '%s' "$RESPONSE" | jq -r '.ok // false' 2>/dev/null || printf 'false')
          MESSAGE_ID=$(printf '%s' "$RESPONSE" | jq -r '.result.message_id // empty' 2>/dev/null || true)
          HAS_VIDEO=$(printf '%s' "$RESPONSE" | jq -r 'if (.result.video | type) == "object" then "true" else "false" end' 2>/dev/null || printf 'false')

          if [ "$CURL_EXIT" -eq 0 ] && [ "$OK" = "true" ] && [ -n "$MESSAGE_ID" ] && [ "$HAS_VIDEO" = "true" ]; then
            STATE='success'
            DESCRIPTION="Telegram message_id=${MESSAGE_ID}"
            COMMENT="✅ Telegram подтвердил отправку правильного видео v3 и текста. message_id=${MESSAGE_ID}"
            RESULT=0
          else
            ERROR_TEXT=$(printf '%s' "$RESPONSE" | jq -r '.description // "Запрос не выполнен"' 2>/dev/null || printf 'Запрос не выполнен')
            STATE='failure'
            DESCRIPTION="Telegram: ${ERROR_TEXT}"
            COMMENT="❌ Telegram не принял правильное видео v3: ${ERROR_TEXT}; curl_exit=${CURL_EXIT}; ok=${OK}; video=${HAS_VIDEO}"
            RESULT=1
          fi

          DESCRIPTION=$(printf '%.130s' "$DESCRIPTION")
          jq -n \
            --arg state "$STATE" \
            --arg context 'telegram-exact-video-v3' \
            --arg description "$DESCRIPTION" \
            '{state: $state, context: $context, description: $description}' \
            > /tmp/status.json

          curl --silent --show-error --fail-with-body \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            --data-binary @/tmp/status.json

          jq -n --arg body "$COMMENT" '{body: $body}' > /tmp/comment.json
          curl --silent --show-error \
            --request POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/issues/1/comments" \
            --data-binary @/tmp/comment.json \
            >/dev/null || true

          exit "$RESULT"
